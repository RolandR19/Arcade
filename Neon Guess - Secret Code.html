<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Guess - Secret Code</title>
    <style>
        /* --- STYLE ARCADE NÉON --- */
        :root {
            --neon-pink: #ff0055;
            --neon-blue: #00d4ff;
            --bg-dark: #0a0b10;
            --surface: #1a1c26;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        /* Conteneur principal */
        .game-container {
            background: var(--surface);
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instruction {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 25px;
        }

        /* Vies / Cœurs */
        .lives-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .heart {
            width: 30px;
            height: 30px;
            fill: var(--neon-pink);
            filter: drop-shadow(0 0 5px var(--neon-pink));
            transition: all 0.3s ease;
        }

        .heart.lost {
            fill: #333;
            filter: none;
            opacity: 0.5;
        }

        /* Formulaire */
        input[type="number"] {
            background: #000;
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            color: white;
            font-size: 2rem;
            padding: 15px;
            width: 100px;
            text-align: center;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
            margin-bottom: 20px;
        }

        button {
            background: var(--neon-blue);
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            color: #888;
        }

        /* Feedback */
        #feedback {
            margin-top: 25px;
            font-size: 1.1rem;
            min-height: 1.5em;
        }

        .win-text { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .error-text { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        /* Code Secret */
        #secret-code {
            display: none;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            margin-top: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
            100% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        }

        #restart-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            margin-top: 20px;
            box-shadow: none;
        }

        #restart-btn:hover {
            background: white;
            color: black;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Neon Guess</h1>
    </header>

    <main class="game-container">
        <p class="instruction">Trouvez le nombre entre 1 et 10</p>

        <div class="lives-container" id="lives-display">
            <!-- Cœurs générés en JS -->
        </div>

        <form id="guess-form" onsubmit="checkGuess(event)">
            <input type="number" id="essai" min="1" max="10" required placeholder="?" autocomplete="off">
            <button type="submit" id="submit-btn">Analyser</button>
        </form>

        <div id="feedback"></div>

        <div id="secret-code">
            <div style="font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Accès Autorisé</div>
            <strong style="font-size: 1.5rem; letter-spacing: 3px;">KEY 1971</strong>
        </div>

        <button id="restart-btn" class="hidden" onclick="initGame()">Recommencer</button>
    </main>

    <script>
        let secretNum;
        let attemptsLeft;
        const maxAttempts = 5;

        const feedback = document.getElementById('feedback');
        const livesDisplay = document.getElementById('lives-display');
        const secretCodeDiv = document.getElementById('secret-code');
        const submitBtn = document.getElementById('submit-btn');
        const restartBtn = document.getElementById('restart-btn');
        const guessInput = document.getElementById('essai');

        function initGame() {
            secretNum = Math.floor(Math.random() * 10) + 1;
            attemptsLeft = maxAttempts;
            feedback.textContent = "";
            feedback.className = "";
            secretCodeDiv.style.display = "none";
            submitBtn.disabled = false;
            restartBtn.classList.add('hidden');
            guessInput.value = "";
            guessInput.disabled = false;
            updateLives();
        }

        function updateLives() {
            livesDisplay.innerHTML = "";
            for (let i = 0; i < maxAttempts; i++) {
                const isLost = i >= attemptsLeft;
                const heart = document.createElement('svg');
                heart.setAttribute('viewBox', '0 0 24 24');
                heart.classList.add('heart');
                if (isLost) heart.classList.add('lost');
                
                heart.innerHTML = `<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>`;
                livesDisplay.appendChild(heart);
            }
        }

        function checkGuess(e) {
            e.preventDefault();
            const userGuess = parseInt(guessInput.value);

            if (isNaN(userGuess) || userGuess < 1 || userGuess > 10) return;

            attemptsLeft--;
            updateLives();

            if (userGuess === secretNum) {
                endGame(true);
            } else if (attemptsLeft <= 0) {
                endGame(false);
            } else {
                feedback.textContent = "NOMBRE INCORRECT";
                feedback.className = "error-text";
                guessInput.value = "";
                guessInput.focus();
            }
        }

        function endGame(isWin) {
            submitBtn.disabled = true;
            guessInput.disabled = true;
            restartBtn.classList.remove('hidden');

            if (isWin) {
                feedback.textContent = "ACCÈS DÉVERROUILLÉ";
                feedback.className = "win-text";
                secretCodeDiv.style.display = "block";
            } else {
                feedback.textContent = `ÉCHEC. LE CODE ÉTAIT ${secretNum}`;
                feedback.className = "error-text";
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
