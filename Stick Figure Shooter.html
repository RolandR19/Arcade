<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Figure Shooter</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background-color: #000;
            display: block;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 100%;
            height: 100%;
        }
        #uiContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        #modal {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            pointer-events: all;
        }
        #modal h1 {
            margin: 0;
            font-size: 4rem;
            color: #ff4d4d;
            text-shadow: 0 0 10px #ff4d4d;
        }
        #modal p {
            font-size: 1.5rem;
            margin: 10px 0 20px;
        }
        #startButton, #restartButton {
            background: linear-gradient(45deg, #ff4d4d, #ff8c8c);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px #ff4d4d;
            font-family: 'Courier New', Courier, monospace;
        }
        #startButton:hover, #restartButton:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px #ff4d4d;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2rem;
            text-shadow: 0 0 5px white;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="uiContainer">
             <div id="score" style="display: none;">Score: 0</div>
            <div id="modal">
                <h1>Stick Shooter</h1>
                <p>Use WASD to move. Aim and shoot with the mouse.</p>
                <button id="startButton">Start Game</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreEl = document.getElementById('score');
        const modalEl = document.getElementById('modal');
        const startButton = document.getElementById('startButton');

        let player, projectiles, enemies, particles, score, animationId;
        let keys = {};
        const mouse = { x: 0, y: 0 };

        // --- Game Initialization ---
        function init() {
            const playerX = canvas.width / 2;
            const playerY = canvas.height / 2;
            player = new Player(playerX, playerY, 15, 'white');
            projectiles = [];
            enemies = [];
            particles = [];
            score = 0;
            scoreEl.innerHTML = `Score: ${score}`;
            scoreEl.style.display = 'block';
            modalEl.style.display = 'none';
        }

        // --- Classes ---
        class Player {
            constructor(x, y, radius, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.speed = 3;
                this.gunAngle = 0;
            }

            draw() {
                // Body
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Gun
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.gunAngle);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(this.radius + 10, 0);
                ctx.lineWidth = 5;
                ctx.strokeStyle = this.color;
                ctx.stroke();
                ctx.restore();
            }
            
            update() {
                this.gunAngle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                
                if (keys['w'] && this.y - this.radius > 0) this.y -= this.speed;
                if (keys['s'] && this.y + this.radius < canvas.height) this.y += this.speed;
                if (keys['a'] && this.x - this.radius > 0) this.x -= this.speed;
                if (keys['d'] && this.x + this.radius < canvas.width) this.x += this.speed;

                this.draw();
            }
        }

        class Projectile {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        class Enemy {
             constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }

            draw() {
                // Body
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();

                // "Eyes" to show direction
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);
                ctx.fillStyle = 'white';
                ctx.fillRect(this.radius / 2, -this.radius / 4, this.radius/2, this.radius/2);
                ctx.restore();
            }

            update() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.velocity.x = Math.cos(angle);
                this.velocity.y = Math.sin(angle);
                
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        const friction = 0.99;
        class Particle {
             constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
                this.alpha = 1;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= friction;
                this.velocity.y *= friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
                this.draw();
            }
        }

        // --- Spawning ---
        let enemyInterval;
        function spawnEnemies() {
            enemyInterval = setInterval(() => {
                const radius = Math.random() * (30 - 10) + 10;
                let x, y;

                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                    y = Math.random() * canvas.height;
                } else {
                    x = Math.random() * canvas.width;
                    y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
                }
                
                const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
                const angle = Math.atan2(player.y - y, player.x - x);
                const velocity = {
                    x: Math.cos(angle),
                    y: Math.sin(angle)
                };

                enemies.push(new Enemy(x, y, radius, color, velocity));
            }, 1000);
        }

        // --- Game Loop ---
        function animate() {
            animationId = requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            player.update();

            // Update Particles
            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                }
            });

            // Update Projectiles
            projectiles.forEach((projectile, pIndex) => {
                projectile.update();

                // Remove projectiles that go off-screen
                if (projectile.x + projectile.radius < 0 ||
                    projectile.x - projectile.radius > canvas.width ||
                    projectile.y + projectile.radius < 0 ||
                    projectile.y - projectile.radius > canvas.height) {
                    setTimeout(() => {
                        projectiles.splice(pIndex, 1);
                    }, 0);
                }
            });

            // Update Enemies & Collision Detection
            enemies.forEach((enemy, eIndex) => {
                enemy.update();

                // Collision: Enemy -> Player (Game Over)
                const distPlayerEnemy = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayerEnemy - enemy.radius - player.radius < 1) {
                    cancelAnimationFrame(animationId);
                    clearInterval(enemyInterval);
                    
                    modalEl.style.display = 'flex';
                    const gameOverTitle = document.createElement('h1');
                    gameOverTitle.innerHTML = 'Game Over';
                    const finalScore = document.createElement('p');
                    finalScore.innerHTML = `Your Score: ${score}`;
                    const restartButton = document.createElement('button');
                    restartButton.id = 'restartButton';
                    restartButton.innerHTML = 'Restart Game';
                    
                    restartButton.addEventListener('click', () => {
                         // Re-add event listeners that might have been lost
                        addEventListeners();
                        init();
                        animate();
                        spawnEnemies();
                    });

                    modalEl.innerHTML = ''; // Clear previous content
                    modalEl.appendChild(gameOverTitle);
                    modalEl.appendChild(finalScore);
                    modalEl.appendChild(restartButton);
                }

                // Collision: Projectile -> Enemy
                projectiles.forEach((projectile, pIndex) => {
                    const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
                    if (dist - enemy.radius - projectile.radius < 1) {
                        
                        // Create explosion particles
                        for (let i = 0; i < enemy.radius * 2; i++) {
                            particles.push(new Particle(
                                projectile.x,
                                projectile.y,
                                Math.random() * 2,
                                enemy.color,
                                {
                                    x: (Math.random() - 0.5) * (Math.random() * 6),
                                    y: (Math.random() - 0.5) * (Math.random() * 6)
                                }
                            ));
                        }

                        if (enemy.radius - 10 > 5) {
                            // Shrink enemy
                            score += 100;
                            gsap.to(enemy, {
                                radius: enemy.radius - 10
                            });
                            setTimeout(() => {
                                projectiles.splice(pIndex, 1);
                            }, 0);
                        } else {
                            // Remove enemy
                            score += 250;
                            setTimeout(() => {
                                enemies.splice(eIndex, 1);
                                projectiles.splice(pIndex, 1);
                            }, 0);
                        }
                        scoreEl.innerHTML = `Score: ${score}`;
                    }
                });
            });
        }
        
        // --- Event Listeners ---
        function addEventListeners() {
            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

            const gameContainer = document.getElementById('gameContainer');
            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                mouse.x = (e.clientX - rect.left) * scaleX;
                mouse.y = (e.clientY - rect.top) * scaleY;
            });

            window.addEventListener('click', (e) => {
                if (animationId) { // Only shoot if game is running
                    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
                    const speed = 5;
                    const velocity = {
                        x: Math.cos(angle) * speed,
                        y: Math.sin(angle) * speed
                    };
                    projectiles.push(new Projectile(player.x, player.y, 5, 'white', velocity));
                }
            });
        }
        
        // --- Resize Handling ---
        function resizeCanvas() {
            const gameContainer = document.getElementById('gameContainer');
            const containerWidth = gameContainer.clientWidth;
            const containerHeight = gameContainer.clientHeight;
            
            const aspectRatio = 16 / 9;
            let newWidth = containerWidth;
            let newHeight = newWidth / aspectRatio;

            if (newHeight > containerHeight) {
                newHeight = containerHeight;
                newWidth = newHeight * aspectRatio;
            }

            canvas.width = 1280; // Internal resolution
            canvas.height = 720;

            canvas.style.width = `${newWidth}px`;
            canvas.style.height = `${newHeight}px`;

            if (player) { // Recenter player if game has started
                 player.x = canvas.width / 2;
                 player.y = canvas.height / 2;
            }
        }
        
        // --- Start Game ---
        window.onload = function() {
            resizeCanvas();
            addEventListeners();
            
            startButton.addEventListener('click', () => {
                init();
                animate();
                spawnEnemies();
            });
        };

        window.addEventListener('resize', resizeCanvas);

    </script>
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
</body>
</html>
