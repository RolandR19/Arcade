<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sphere Escape</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2c3e50;
            font-family: 'Arial', sans-serif;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            text-align: left;
            z-index: 10;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: #e74c3c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            text-align: center;
            z-index: 20;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        
        #game-over-screen.visible {
            visibility: visible;
            opacity: 1;
        }

        #game-over-screen button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.5rem;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #game-over-screen button:hover {
            background-color: #2980b9;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            text-align: center;
            z-index: 10;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-info">
        <p>Score : <span id="score">0</span></p>
        <p>Vies : <span id="lives">3</span></p>
    </div>
    <div id="game-over-screen">
        <h2>Game Over</h2>
        <p>Votre score final : <span id="final-score">0</span></p>
        <button onclick="window.location.reload()">Rejouer</button>
    </div>
    <div id="instructions">
        Utilisez les touches fléchées (ou ZQSD) pour déplacer la sphère. Évitez les boîtes !
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Variables de jeu
        const livesDisplay = document.getElementById('lives');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        let lives = 3;
        let score = 0;
        let isGameOver = false;
        
        // Setup Three.js
        let scene, camera, renderer;
        let player, box1, box2;
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, z: false, q: false, s: false, d: false };
        let box1Direction = 1;
        let box2Direction = 1;
        
        function init() {
            // Créer la scène
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x34495e);
            
            // Créer la caméra
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);
            camera.lookAt(0, 0, 0);

            // Créer le renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Créer le plan
            const planeGeometry = new THREE.PlaneGeometry(30, 30);
            const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.receiveShadow = true;
            scene.add(plane);

            // Créer le joueur (sphère)
            const playerGeometry = new THREE.SphereGeometry(1, 32, 16);
            const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x3498db });
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.y = 1;
            player.castShadow = true;
            scene.add(player);

            // Créer les obstacles (boîtes)
            const boxGeometry = new THREE.BoxGeometry(2, 2, 2);
            const boxMaterial = new THREE.MeshStandardMaterial({ color: 0xe74c3c });

            box1 = new THREE.Mesh(boxGeometry, boxMaterial);
            box1.position.set(5, 1, -5);
            box1.castShadow = true;
            scene.add(box1);

            box2 = new THREE.Mesh(boxGeometry, boxMaterial);
            box2.position.set(-5, 1, 5);
            box2.castShadow = true;
            scene.add(box2);

            // Ajouter une lumière
            const ambientLight = new THREE.AmbientLight(0x404040, 2); // lumière douce
            scene.add(ambientLight);
            
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(0, 20, 10);
            spotLight.castShadow = true;
            scene.add(spotLight);

            // Gestion des événements
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('keydown', onKeyDown, false);
            document.addEventListener('keyup', onKeyUp, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function onKeyDown(event) {
            const key = event.key.toLowerCase();
            if (key in keys) {
                keys[key] = true;
            }
        }
        
        function onKeyUp(event) {
            const key = event.key.toLowerCase();
            if (key in keys) {
                keys[key] = false;
            }
        }

        function updatePlayer() {
            if (isGameOver) return;
            const speed = 0.15;
            if (keys.ArrowUp || keys.z) {
                player.position.z -= speed;
            }
            if (keys.ArrowDown || keys.s) {
                player.position.z += speed;
            }
            if (keys.ArrowLeft || keys.q) {
                player.position.x -= speed;
            }
            if (keys.ArrowRight || keys.d) {
                player.position.x += speed;
            }
            // Limiter les mouvements du joueur au plan
            const limit = 14;
            player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
            player.position.z = Math.max(-limit, Math.min(limit, player.position.z));
        }

        function updateObstacles() {
            if (isGameOver) return;
            // Mouvement simple de va-et-vient pour les boîtes
            const boxSpeed = 0.05 + score * 0.005;

            box1.position.x += box1Direction * boxSpeed;
            if (box1.position.x > 10 || box1.position.x < -10) {
                box1Direction *= -1;
            }

            box2.position.z += box2Direction * boxSpeed;
            if (box2.position.z > 10 || box2.position.z < -10) {
                box2Direction *= -1;
            }
        }

        function checkCollisions() {
            if (isGameOver) return;
            const playerRadius = 1;
            const boxSize = 2;
            
            const distance1 = player.position.distanceTo(box1.position);
            const distance2 = player.position.distanceTo(box2.position);
            
            if (distance1 < playerRadius + boxSize / 2 || distance2 < playerRadius + boxSize / 2) {
                handleCollision();
            }
        }
        
        function handleCollision() {
            lives--;
            livesDisplay.textContent = lives;
            if (lives <= 0) {
                endGame();
            } else {
                // Flash visuel pour indiquer les dégâts
                player.material.color.set(0xff0000);
                setTimeout(() => {
                    player.material.color.set(0x3498db);
                }, 200);
                
                // Réinitialiser la position du joueur
                player.position.set(0, 1, 0);
                
                // Augmenter le score même en cas de collision, pour récompenser la progression
                score += 10;
                scoreDisplay.textContent = score;
            }
        }

        function endGame() {
            isGameOver = true;
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('visible');
        }

        function updateScore() {
            if (!isGameOver) {
                score++;
                scoreDisplay.textContent = score;
                
                // Mettre à jour la vitesse des boîtes en fonction du score pour augmenter la difficulté
                updateObstacles();
            }
        }
        
        let scoreInterval = setInterval(updateScore, 1000);

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            updatePlayer();
            updateObstacles();
            checkCollisions();
            renderer.render(scene, camera);
        }

        window.onload = function() {
            init();
            animate();
        };

    </script>
</body>
</html>
