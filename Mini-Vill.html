<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Ville</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            padding: 20px;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            background-color: #d1e5d7;
            border: 4px solid #4a6c5b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #game-info {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 12px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a6c5b;
        }

        .controls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .control-button {
            background-color: #4a6c5b;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px #3a5545;
            user-select: none;
        }

        .control-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px #3a5545;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .d-pad-button {
            background-color: #4a6c5b;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-size: 2rem;
            user-select: none;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
        }

        .d-pad-button.up { grid-area: 1 / 2 / 2 / 3; }
        .d-pad-button.left { grid-area: 2 / 1 / 3 / 2; }
        .d-pad-button.right { grid-area: 2 / 3 / 3 / 4; }
        .d-pad-button.down { grid-area: 3 / 2 / 4 / 3; }

        .d-pad-button:active {
            transform: scale(0.95);
            background-color: #3a5545;
        }

        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 100;
            display: none;
        }

        .message-box button {
            background-color: #4a6c5b;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center p-4 min-h-screen">

    <div class="text-center mb-4">
        <h1 class="text-3xl font-bold text-gray-800">Mini-Ville</h1>
        <p class="text-gray-600">Ramassez tous les objets !</p>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="game-info">Objets: <span id="scoreDisplay">0</span> / 5</div>
        <div id="messageBox" class="message-box">
            <span id="messageText"></span>
            <button onclick="hideMessageBox()">OK</button>
        </div>
    </div>

    <!-- Interface pour le client (téléphone) -->
    <div id="client-interface" class="hidden">
        <div class="controls-container">
            <div class="d-pad">
                <div id="touchUp" class="d-pad-button up">↑</div>
                <div id="touchLeft" class="d-pad-button left">←</div>
                <div id="touchRight" class="d-pad-button right">→</div>
                <div id="touchDown" class="d-pad-button down">↓</div>
            </div>
        </div>
        <div class="mt-4 p-4 bg-white rounded-lg shadow-md">
            <p>Connecté au serveur : <span id="connectionStatus" class="text-red-500">Déconnecté</span></p>
        </div>
    </div>

    <!-- Interface pour le serveur (ordinateur) -->
    <div id="server-interface" class="hidden">
        <p class="text-gray-600 mt-4">Scannez ce QR code avec votre téléphone pour vous connecter.</p>
        <div id="qrcode"></div>
        <p class="mt-2 text-gray-500">Ou entrez cette URL manuellement : <span id="serverUrl" class="font-mono"></span></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');

        let car = {
            x: 50,
            y: 50,
            width: 30,
            height: 20,
            color: '#c23616',
            speed: 3,
            dx: 0,
            dy: 0,
            angle: 0
        };

        const objects = [];
        const numObjects = 5;
        let score = 0;
        let isGameOver = false;

        function showMessageBox(message) {
            messageText.textContent = message;
            messageBox.style.display = 'block';
        }

        function hideMessageBox() {
            messageBox.style.display = 'none';
        }

        function generateObjects() {
            for (let i = 0; i < numObjects; i++) {
                objects.push({
                    x: Math.random() * (canvas.width - 20) + 10,
                    y: Math.random() * (canvas.height - 20) + 10,
                    radius: 8,
                    color: '#f9ca24',
                    isCollected: false
                });
            }
        }

        function drawCar() {
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);
            ctx.fillStyle = car.color;
            ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);
            ctx.restore();
        }

        function drawObjects() {
            objects.forEach(obj => {
                if (!obj.isCollected) {
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                    ctx.fillStyle = obj.color;
                    ctx.fill();
                    ctx.closePath();
                }
            });
        }

        function update() {
            if (isGameOver) return;

            car.x += car.dx;
            car.y += car.dy;

            // Collision avec les bords du canvas
            if (car.x + car.width / 2 > canvas.width || car.x - car.width / 2 < 0) {
                car.dx = -car.dx;
            }
            if (car.y + car.height / 2 > canvas.height || car.y - car.height / 2 < 0) {
                car.dy = -car.dy;
            }

            // Vérification des collisions avec les objets
            objects.forEach(obj => {
                if (!obj.isCollected) {
                    const distance = Math.sqrt((car.x - obj.x) ** 2 + (car.y - obj.y) ** 2);
                    if (distance < car.width / 2 + obj.radius) {
                        obj.isCollected = true;
                        score++;
                        scoreDisplay.textContent = score;

                        if (score === numObjects) {
                            isGameOver = true;
                            showMessageBox("Félicitations ! Vous avez ramassé tous les objets !");
                        }
                    }
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCar();
            drawObjects();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Variable pour le WebSocket
        let ws;

        // Fonction pour gérer la connexion WebSocket
        function setupWebSocket() {
            // Tentative de connexion au WebSocket
            try {
                ws = new WebSocket('ws://' + window.location.hostname + ':' + window.location.port);

                ws.onopen = function() {
                    console.log('Connecté au serveur WebSocket.');
                    // Masquer les contrôles locaux et afficher la connexion
                    document.querySelector('.controls-container.md\\:hidden').style.display = 'none';
                    document.getElementById('server-interface').classList.remove('hidden');
                };

                ws.onmessage = function(event) {
                    // Traiter les commandes reçues du client (téléphone)
                    const message = JSON.parse(event.data);
                    if (message.type === 'control') {
                        car.dx = message.dx;
                        car.dy = message.dy;
                        car.angle = message.angle;
                    }
                };

                ws.onclose = function() {
                    console.log('Déconnecté du serveur WebSocket.');
                };

                ws.onerror = function(error) {
                    console.error('Erreur WebSocket:', error);
                };
            } catch (error) {
                console.log('Pas de serveur WebSocket, utilisant les contrôles locaux.');
                // Afficher les contrôles locaux
                document.querySelector('.controls-container.md\\:hidden').style.display = 'flex';
                document.getElementById('server-interface').classList.add('hidden');
                // Masquer les messages de connexion
                document.getElementById('client-interface').classList.add('hidden');
            }
        }

        // Fonction pour envoyer les commandes au serveur
        function sendControl(dx, dy, angle) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'control',
                    dx: dx,
                    dy: dy,
                    angle: angle
                };
                ws.send(JSON.stringify(message));
            }
        }

        // Gestion des entrées clavier (pour le jeu local)
        function handleKeyDown(e) {
            if (isGameOver) return;
            if (e.key === 'ArrowRight' || e.key === 'd') {
                car.dx = car.speed;
                car.dy = 0;
                car.angle = 0;
            } else if (e.key === 'ArrowLeft' || e.key === 'q') {
                car.dx = -car.speed;
                car.dy = 0;
                car.angle = Math.PI;
            } else if (e.key === 'ArrowUp' || e.key === 'z') {
                car.dy = -car.speed;
                car.dx = 0;
                car.angle = -Math.PI / 2;
            } else if (e.key === 'ArrowDown' || e.key === 's') {
                car.dy = car.speed;
                car.dx = 0;
                car.angle = Math.PI / 2;
            }
        }

        function handleKeyUp(e) {
            car.dx = 0;
            car.dy = 0;
        }

        // Gestion des entrées tactiles pour le client mobile
        const touchControls = {
            up: document.getElementById('touchUp'),
            down: document.getElementById('touchDown'),
            left: document.getElementById('touchLeft'),
            right: document.getElementById('touchRight')
        };

        const touchHandler = (direction) => {
            if (isGameOver) return;
            switch (direction) {
                case 'up':
                    sendControl(0, -car.speed, -Math.PI / 2);
                    break;
                case 'down':
                    sendControl(0, car.speed, Math.PI / 2);
                    break;
                case 'left':
                    sendControl(-car.speed, 0, Math.PI);
                    break;
                case 'right':
                    sendControl(car.speed, 0, 0);
                    break;
            }
        };

        const stopCar = () => {
            sendControl(0, 0, car.angle);
        };
        
        // Attacher les écouteurs d'événements
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        
        touchControls.up.addEventListener('mousedown', () => touchHandler('up'));
        touchControls.up.addEventListener('mouseup', stopCar);
        touchControls.up.addEventListener('mouseleave', stopCar);
        touchControls.up.addEventListener('touchstart', (e) => { e.preventDefault(); touchHandler('up'); });
        touchControls.up.addEventListener('touchend', stopCar);

        touchControls.down.addEventListener('mousedown', () => touchHandler('down'));
        touchControls.down.addEventListener('mouseup', stopCar);
        touchControls.down.addEventListener('mouseleave', stopCar);
        touchControls.down.addEventListener('touchstart', (e) => { e.preventDefault(); touchHandler('down'); });
        touchControls.down.addEventListener('touchend', stopCar);

        touchControls.left.addEventListener('mousedown', () => touchHandler('left'));
        touchControls.left.addEventListener('mouseup', stopCar);
        touchControls.left.addEventListener('mouseleave', stopCar);
        touchControls.left.addEventListener('touchstart', (e) => { e.preventDefault(); touchHandler('left'); });
        touchControls.left.addEventListener('touchend', stopCar);

        touchControls.right.addEventListener('mousedown', () => touchHandler('right'));
        touchControls.right.addEventListener('mouseup', stopCar);
        touchControls.right.addEventListener('mouseleave', stopCar);
        touchControls.right.addEventListener('touchstart', (e) => { e.preventDefault(); touchHandler('right'); });
        touchControls.right.addEventListener('touchend', stopCar);

        // Initialisation du jeu
        window.onload = function () {
            // Resize canvas to fit the container
            const gameContainer = document.querySelector('.game-container');
            canvas.width = gameContainer.offsetWidth;
            canvas.height = gameContainer.offsetHeight;
            
            generateObjects();
            gameLoop();
        };

    </script>
</body>
</html>
